events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    add_header Access-Control-Allow-Origin *;

    server {
        listen 8045;
        server_name _; 

        location = /nginx_status {
            stub_status;
            access_log off;
            allow all;
        }

        location = /grafana {
            return 301 /grafana/;
        }

        location /grafana/ {
            proxy_pass http://grafana:3000/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /prometheus {
            return 301 /prometheus/;
        }

        location /prometheus/ {
            proxy_pass http://prometheus:9090/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ===============================================
        # RUTAS HACIA EL MS-USUARIOS (Puerto 3000)
        # ===============================================
        location /api/usuarios {
            proxy_pass http://ms-usuarios:3000/api/usuarios;
            proxy_set_header Host $http_host; 
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/roles {
            proxy_pass http://ms-usuarios:3000/api/roles;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # RUTAS ESPECÍFICAS CON PARÁMETROS (deben ir antes de las generales)
        # ===============================================
        location ~ ^/api/areas/contratista/([^/]+)$ {
            proxy_pass http://ms-mantenedor:3001/api/areas/contratista/$1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location ~ ^/api/disciplinas/area/([^/]+)$ {
            proxy_pass http://ms-mantenedor:3001/api/disciplinas/area/$1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location ~ ^/api/procesos/area/([^/]+)$ {
            proxy_pass http://ms-expedientes:3002/api/procesos/area/$1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ===============================================
        # RUTAS HACIA EL MS-MANTENEDOR (Puerto 3001)
        # ===============================================
        location /api/areas {
            proxy_pass http://ms-mantenedor:3001/api/areas;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/contratistas {
            proxy_pass http://ms-mantenedor:3001/api/contratistas;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/disciplinas {
            proxy_pass http://ms-mantenedor:3001/api/disciplinas;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/categorias {
            proxy_pass http://ms-mantenedor:3001/api/categorias;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/subtipos {
            proxy_pass http://ms-mantenedor:3001/api/subtipos;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ===============================================
        # RUTAS HACIA EL MS-EXPEDIENTES (Puerto 3002)
        # ===============================================
        location /api/procesos {
            proxy_pass http://ms-expedientes:3002/api/procesos;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location ~ ^/api/procesos-por-area/([^/]+)$ {
            proxy_pass http://ms-expedientes:3002/api/procesos-por-area/$1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/etapas-proceso {
            proxy_pass http://ms-expedientes:3002/api/etapas-proceso;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/expedientes {
            proxy_pass http://ms-expedientes:3002/api/expedientes;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/documentos {
            proxy_pass http://ms-expedientes:3002/api/documentos;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/historial {
            proxy_pass http://ms-expedientes:3002/api/historial;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/tareas/ {
            proxy_pass http://ms-expedientes:3002;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/login {
    proxy_pass http://ms-usuarios:3000/api/login;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}

# ===============================================
        # RUTAS DEL FRONTEND (React / Vite) - SPA
        # ===============================================
        # Primero intentar servir archivos estáticos (JS, CSS, imágenes)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://frontend:5173;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Para todas las demás rutas (SPA), devolver el index.html
        # y dejar que React Router maneje la ruta en el cliente
        location / {
            proxy_pass http://frontend:5173/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
