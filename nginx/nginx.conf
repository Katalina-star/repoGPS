events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    add_header Access-Control-Allow-Origin *;

    server {
        listen 8045;
        server_name _; 

        # ===============================================
        # RUTAS HACIA EL MS-USUARIOS (Puerto 3000)
        # ===============================================
        location /api/usuarios {
            proxy_pass http://ms-usuarios:3000/api/usuarios;
            proxy_set_header Host $http_host; 
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/roles {
            proxy_pass http://ms-usuarios:3000/api/roles;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ===============================================
        # RUTAS HACIA EL MS-MANTENEDOR (Puerto 3001)
        # ===============================================
        location /api/areas {
            proxy_pass http://ms-mantenedor:3001/api/areas;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/contratistas {
            proxy_pass http://ms-mantenedor:3001/api/contratistas;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/disciplinas {
            proxy_pass http://ms-mantenedor:3001/api/disciplinas;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ===============================================
        # RUTAS HACIA EL FRONTEND (React / Vite)
        # ===============================================
        location / {
            proxy_pass http://frontend:5173/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}