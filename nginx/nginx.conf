events {}
http {
    server {
        listen 80;

        # CORS dinámico - acepta ambos orígenes (con y sin puerto)
        location /api/ {
            add_header Access-Control-Allow-Origin "http://pacheco.chillan.ubiobio.cl:8045" always;
            add_header Access-Control-Allow-Origin "http://pacheco.chillan.ubiobio.cl" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
            add_header Access-Control-Allow-Credentials "true" always;
            
            if ($request_method = OPTIONS) {
                return 204;
            }

            # Microservicio Usuarios
            location /api/usuarios {
                proxy_pass http://ms-usuarios:3000/api/usuarios;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }

            location /api/roles {
                proxy_pass http://ms-usuarios:3000/api/roles;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }

            # Microservicio Mantenedor
            location /api/areas {
                proxy_pass http://ms-mantenedor:3001/api/areas;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }

            location /api/contratistas {
                proxy_pass http://ms-mantenedor:3001/api/contratistas;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }

            location /api/disciplinas {
                proxy_pass http://ms-mantenedor:3001/api/disciplinas;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }
        }

        # Frontend
        location / {
            proxy_pass http://frontend:5173;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
        }
    }
}