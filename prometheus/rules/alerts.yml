groups:
  - name: basic-alerts
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Instance down"
          description: "{{ $labels.instance }} is down"
  - name: service-alerts
    rules:
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_request_duration_seconds_count{status=~"5.."}[5m]))
            /
            sum(rate(http_request_duration_seconds_count[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High HTTP 5xx error rate"
          description: "More than 5% of requests are failing with 5xx."

      - alert: SlowAPI
        expr: |
          histogram_quantile(0.99,
            sum by (le) (rate(http_request_duration_seconds_bucket[5m]))
          ) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High API latency (p99)"
          description: "p99 latency is above 1s for 10 minutes."

      - alert: DBConnectionsHigh
        expr: pg_stat_activity_count > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Postgres connections high"
          description: "Postgres connections exceed 80."

      - alert: DiskSpaceHigh
        expr: |
          (node_filesystem_size_bytes{fstype!~"tmpfs|overlay"} - node_filesystem_free_bytes{fstype!~"tmpfs|overlay"})
          / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"} > 0.85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Disk usage high"
          description: "Disk usage is above 85%."

      - alert: UploadFails
        expr: rate(upload_errors_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Upload errors detected"
          description: "Upload errors are occurring in ms-expedientes."
