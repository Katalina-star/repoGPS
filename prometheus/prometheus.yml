global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: postgres-exporter
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: nginx-exporter
    static_configs:
      - targets:
          - nginx-exporter:9113

  - job_name: ms-usuarios
    metrics_path: /metrics
    static_configs:
      - targets:
          - ms-usuarios:3000

  - job_name: ms-mantenedor
    metrics_path: /metrics
    static_configs:
      - targets:
          - ms-mantenedor:3001

  - job_name: ms-expedientes
    metrics_path: /metrics
    static_configs:
      - targets:
          - ms-expedientes:3002
