version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: db_usuarios
    #ports:
    #  - "127.0.0.1:5433:5432" 
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data

  ms-usuarios:
    image: ghcr.io/katalina-star/repogps-backend:latest
    environment:
      - NODE_OPTIONS=--max-old-space-size=256
    deploy:
      resources:
        limits:
          memory: 300M
    depends_on:
      - db

  frontend:
    image: ghcr.io/katalina-star/repogps-frontend:latest
    deploy:
      resources:
        limits:
          memory: 300M
    depends_on:
      - ms-usuarios

  nginx:
    image: nginx:alpine
    ports:
      - "8045:8045" 
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - ms-usuarios

volumes:
  pgdata: