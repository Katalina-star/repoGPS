version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: db_usuarios
    ports:
      - "5432:5432"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  ms-usuarios:
    build: 
      context: ./backend/ms-usuarios 
    ports:
      - "3000:3000"
    depends_on:
      - db

  frontend:
    build: 
      context: ./frontend 
    ports:
      - "5173:5173"
    depends_on:
      - ms-usuarios