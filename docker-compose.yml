version: '3.8'

services:
  # ============================================
  # Base de datos de Usuarios (existente)
  # ============================================
  db:
    image: postgres:15
    container_name: db_usuarios
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: db_usuarios
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata_usuarios:/var/lib/postgresql/data
    networks:
      - app-network

  # ============================================
  # Base de datos del Mantenedor (NUEVA)
  # ============================================
  db_mantenedor:
    image: postgres:15
    container_name: db_mantenedor
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: db_mantenedor
    volumes:
      - ./database/init_mantenedor.sql:/docker-entrypoint-initdb.d/init_mantenedor.sql
      - pgdata_mantenedor:/var/lib/postgresql/data
    networks:
      - app-network

  # ============================================
  # Base de datos de Expedientes (NUEVA)
  # ============================================
  db_expedientes:
    image: postgres:15
    container_name: db_expedientes
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: db_expedientes
    volumes:
      - ./database/init_expedientes.sql:/docker-entrypoint-initdb.d/init_expedientes.sql
      - pgdata_expedientes:/var/lib/postgresql/data
    networks:
      - app-network

  # ============================================
  # Microservicio Usuarios
  # ============================================
  ms-usuarios:
    image: ghcr.io/katalina-star/repogps/repogps-ms-usuarios:latest
    container_name: ms-usuarios
    environment:
      - NODE_OPTIONS=--max-old-space-size=256
      - DB_USER=postgres
      - DB_HOST=db
      - DB_NAME=db_usuarios
      - DB_PASSWORD=password123
      - DB_PORT=5432
      - MS_MANTENEDOR_URL=http://ms-mantenedor:3001
    depends_on:
      - db
      - db_mantenedor
      - ms-mantenedor
    networks:
      - app-network

  # ============================================
  # Microservicio Mantenedor
  # ============================================
  ms-mantenedor:
    image: ghcr.io/katalina-star/repogps/repogps-ms-mantenedor:latest
    container_name: ms-mantenedor
    environment:
      - DB_USER=postgres
      - DB_HOST=db_mantenedor
      - DB_NAME=db_mantenedor
      - DB_PASSWORD=password123
      - DB_PORT=5432
      - PORT=3001
    depends_on:
      - db_mantenedor
    networks:
      - app-network

  # ============================================
  # GarageHQ Storage (S3-compatible)
  # ============================================
  garage-hq:
    image: dxflrs/garage:v2.3.0
    container_name: garage-hq
    ports:
      - "3900:3900"
      - "3901:3901"
      - "3902:3902"
      - "3903:3903"
    environment:
      - GARAGE_DEFAULT_ACCESS_KEY=GKadmin01
      - GARAGE_DEFAULT_SECRET_KEY=changeme123
      - GARAGE_DEFAULT_BUCKET=repogps-docs
      - GARAGE_LOG_LEVEL=info
    volumes:
      - ./garage/garage.toml:/etc/garage.toml:ro
      - garage-data:/var/lib/garage
    command: ["/garage", "server", "--single-node", "--default-bucket"]
    networks:
      - app-network

  # ============================================
  # Microservicio Expedientes
  # ============================================
  ms-expedientes:
    image: ghcr.io/katalina-star/repogps/repogps-ms-expedientes:latest
    container_name: ms-expedientes
    expose:
      - "3002"
    environment:
      - DB_USER=postgres
      - DB_HOST=db_expedientes
      - DB_NAME=db_expedientes
      - DB_PASSWORD=password123
      - DB_PORT=5432
      - PORT=3002
      - MS_MANTENEDOR_URL=http://ms-mantenedor:3001
      - GARAGE_ENDPOINT=http://garage-hq:3900
      - GARAGE_ACCESS_KEY=GKadmin01
      - GARAGE_SECRET_KEY=changeme123
      - GARAGE_BUCKET=repogps-docs
    depends_on:
      - db_expedientes
      - ms-mantenedor
      - garage-hq
    networks:
      - app-network

  # ============================================
  # Frontend
  # ============================================
  frontend:
    image: ghcr.io/katalina-star/repogps/repogps-frontend:latest
    container_name: frontend-ui
    environment:
      - VITE_API_USUARIOS_URL=http://nginx:80
    networks:
      - app-network

  # ============================================
  # Nginx (existente)
  # ============================================
  nginx:
    image: nginx:alpine
    ports:
      - "8045:8045"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - ms-usuarios
      - ms-mantenedor
      - ms-expedientes
    networks:
      - app-network

  # ============================================
  # Monitoring (internal-only, sin puertos expuestos)
  # ============================================
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.external-url=/prometheus"
      - "--web.route-prefix=/prometheus"
    depends_on:
      - ms-usuarios
      - ms-mantenedor
      - ms-expedientes
      - node-exporter
      - postgres-exporter
      - nginx-exporter
    networks:
      - app-network

  grafana:
    image: grafana/grafana:10.4.5
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SERVER_ROOT_URL=http://pacheco.chillan.ubiobio.cl:8045/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - app-network

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - app-network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter
    environment:
      - DATA_SOURCE_NAME=postgresql://postgres:password123@db:5432/db_usuarios?sslmode=disable
    depends_on:
      - db
    networks:
      - app-network

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.1.0
    container_name: nginx-exporter
    command:
      - "-nginx.scrape-uri=http://nginx:8045/nginx_status"
    depends_on:
      - nginx
    networks:
      - app-network

volumes:
  pgdata_usuarios:
  pgdata_mantenedor:
  pgdata_expedientes:
  prometheus-data:
  grafana-data:
  garage-data:

networks:
  app-network:
    driver: bridge
    
