name: Pipeline Empresarial (CI/CD)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  REPO_LOWER: katalina-star/repogps

jobs:
  # ==========================================
  # FASE 1A: AUDITORÍA DE SEGURIDAD (CodeQL)
  # ==========================================
  security-scan:
    name: Escáner de Vulnerabilidades
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - uses: github/codeql-action/analyze@v3

  # ==========================================
  # FASE 1B: INTEGRACIÓN CONTINUA (Linter + Pruebas)
  # ==========================================
  test-and-build:
    name: Pruebas de Calidad
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      # Frontend
      - name: Linter y Build Frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run lint
          npm run build
      
      # Backend ms-usuarios
      - name: Instalar Backend Usuarios
        working-directory: ./backend/ms-usuarios
        run: npm ci
      
      # Backend ms-mantenedor
      - name: Instalar Backend Mantenedor
        working-directory: ./backend/ms-mantenedor
        run: npm install

      # Backend ms-expedientes
      - name: Instalar Backend Expedientes
        working-directory: ./backend/ms-expedientes
        run: npm install

  # ==========================================
  # FASE 2: LA FÁBRICA (Construir Imágenes en GitHub)
  # ==========================================
  build-and-push-images:
    name: Empaquetar en GitHub
    needs: [test-and-build, security-scan]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write 
    steps:
      - uses: actions/checkout@v4

      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ============================================
      # Build Frontend
      # ============================================
      - name: Construir y Subir Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/repogps-frontend:latest
          no-cache: true

      # ============================================
      # Build ms-usuarios
      # ============================================
      - name: Construir y Subir Backend Usuarios
        uses: docker/build-push-action@v5
        with:
          context: ./backend/ms-usuarios
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/repogps-ms-usuarios:latest
          cache-from: type=registry,ref=ghcr.io/${{ env.REPO_LOWER }}/repogps-ms-usuarios:latest
          cache-to: type=inline

      # ============================================
      # Build ms-mantenedor (NUEVO)
      # ============================================
      - name: Construir y Subir Backend Mantenedor
        uses: docker/build-push-action@v5
        with:
          context: ./backend/ms-mantenedor
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/repogps-ms-mantenedor:latest
          cache-from: type=registry,ref=ghcr.io/${{ env.REPO_LOWER }}/repogps-ms-mantenedor:latest
          cache-to: type=inline

      # ============================================
      # Build ms-expedientes
      # ============================================
      - name: Construir y Subir Backend Expedientes
        uses: docker/build-push-action@v5
        with:
          context: ./backend/ms-expedientes
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/repogps-ms-expedientes:latest
          cache-from: type=registry,ref=ghcr.io/${{ env.REPO_LOWER }}/repogps-ms-expedientes:latest
          cache-to: type=inline

  # ==========================================
  # FASE 3: DESPLIEGUE CONTINUO (CD) - Servidor UBB
  # ==========================================
  deploy-to-ubb:
    name: Desplegar en Servidor UBB
    needs: build-and-push-images 
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Conectar y Desplegar
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.UBB_HOST }}
          username: ${{ secrets.UBB_USERNAME }}
          key: ${{ secrets.UBB_SSH_KEY }} 
          passphrase: ${{ secrets.UBB_SSH_PASSPHRASE }}
          envs: GITHUB_TOKEN
          script: |
            cd ~/repoGPS
            git pull origin main
            
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            docker-compose pull
            
            docker-compose down
            
            docker system prune -f
            
            docker-compose up -d
            
            docker image prune -a -f
