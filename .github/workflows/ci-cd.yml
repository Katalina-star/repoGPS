name: Pipeline Empresarial (CI/CD)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ==========================================
  # FASE 1A: AUDITORÍA DE SEGURIDAD (CodeQL)
  # ==========================================
  security-scan:
    name: Escáner de Vulnerabilidades
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - uses: github/codeql-action/analyze@v3

  # ==========================================
  # FASE 1B: INTEGRACIÓN CONTINUA (Linter + Pruebas)
  # ==========================================
  test-and-build:
    name: Pruebas de Calidad
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Linter y Build Frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run lint
          npm run build
      - name: Instalar Backend
        working-directory: ./backend/ms-usuarios
        run: npm ci

  # ==========================================
  # FASE 2: LA FÁBRICA (Construir Imágenes en GitHub)
  # ==========================================
  build-and-push-images:
    name: Empaquetar en GitHub
    needs: [test-and-build, security-scan]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write 
    steps:
      - uses: actions/checkout@v4

      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir y Subir Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend/ms-usuarios
          push: true
          tags: ghcr.io/katalina-star/repogps-backend:latest

      - name: Construir y Subir Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/katalina-star/repogps-frontend:latest

  # ==========================================
  # FASE 3: DESPLIEGUE CONTINUO (CD) - El Repartidor
  # ==========================================
  deploy-to-digitalocean:
    name: Desplegar en Servidor
    needs: build-and-push-images 
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Conectar y Desplegar
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          envs: GITHUB_TOKEN
          script: |
            cd ~/repoGPS
            git pull origin main
            
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            docker-compose pull
            
            docker-compose down
            
            docker system prune -f
            
            docker-compose up -d
            
            docker image prune -a -f