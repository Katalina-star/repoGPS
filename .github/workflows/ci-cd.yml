name: Pipeline (CI/CD)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ==========================================
  # FASE 1A: AUDITORÍA DE SEGURIDAD (CodeQL)
  # ==========================================
  security-scan:
    name: Escáner de Vulnerabilidades
    runs-on: ubuntu-latest
    permissions:
      security-events: write 
      actions: read
      contents: read
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Inicializar CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript 

      - name: Analizar Código
        uses: github/codeql-action/analyze@v3

  # ==========================================
  # FASE 1B: INTEGRACIÓN CONTINUA (Linter + Build)
  # ==========================================
  test-and-build:
    name: Pruebas de Calidad
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Auditoría de Calidad Frontend (Linter)
        working-directory: ./frontend
        run: |
          npm ci
          npm run lint  

      - name: Compilar Frontend
        working-directory: ./frontend
        run: npm run build

      - name: 🧪 Instalar Backend
        working-directory: ./backend/ms-usuarios
        run: npm ci

  # ==========================================
  # FASE 2: DESPLIEGUE CONTINUO (CD)
  # ==========================================
  deploy-to-digitalocean:
    needs: [test-and-build, security-scan] 
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Conectar y Desplegar en Producción
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd ~/repoGPS
            git pull origin main
            docker-compose up -d --build frontend ms-usuarios
            docker image prune -f