version: '3.8'

# Override para desarrollo local - NO commitear a main
# Uso: docker-compose -f docker-compose.yml -f docker-compose.local.yml up --build

services:
  # ============================================
  # Microservicio Mantenedor (Directo sin build - usa código local)
  # ============================================
  ms-mantenedor:
    image: node:18-alpine
    container_name: ms-mantenedor
    working_dir: /app
    command: sh -c "npm install && node index.js"
    environment:
      - DB_USER=postgres
      - DB_HOST=db_mantenedor
      - DB_NAME=db_mantenedor
      - DB_PASSWORD=password123
      - DB_PORT=5432
      - PORT=3001
    volumes:
      - ./backend/ms-mantenedor:/app
    networks:
      - app-network

  # ============================================
  # Microservicio Expedientes (Directo sin build - usa código local)
  # ============================================
  ms-expedientes:
    image: node:18-alpine
    container_name: ms-expedientes
    working_dir: /app
    command: sh -c "npm install && node index.js"
    environment:
      - DB_USER=postgres
      - DB_HOST=db_expedientes
      - DB_NAME=db_expedientes
      - DB_PASSWORD=password123
      - DB_PORT=5432
      - PORT=3002
      - MS_MANTENEDOR_URL=http://ms-mantenedor:3001
    volumes:
      - ./backend/ms-expedientes:/app
    networks:
      - app-network

  # ============================================
  # Frontend (Build local desde repositorio)
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend-ui
    environment:
      # Usar ruta relativa para que funcione desde el navegador
      - VITE_API_URL=
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules
    ports:
      - "5173:5173"
    networks:
      - app-network

  # ============================================
  # Nginx (Build local)
  # ============================================
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "8045:8045"
    depends_on:
      - frontend
      - ms-usuarios
      - ms-mantenedor
      - ms-expedientes
    networks:
      - app-network

networks:
  app-network:
    name: repogps_app-network
    external: true